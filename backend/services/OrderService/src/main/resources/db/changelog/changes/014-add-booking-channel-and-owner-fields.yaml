databaseChangeLog:
  - changeSet:
      id: 014-add-booking-channel-and-owner-fields
      author: codex
      changes:
        - dropNotNullConstraint:
            tableName: orders
            columnName: tenant_id
            columnDataType: uuid
        - dropNotNullConstraint:
            tableName: order_quote_sessions
            columnName: tenant_id
            columnDataType: uuid
        - addColumn:
            tableName: orders
            columns:
              - column:
                  name: owner_user_id
                  type: uuid
              - column:
                  name: booking_channel
                  type: varchar(20)
              - column:
                  name: guest_access_token
                  type: varchar(120)
        - addColumn:
            tableName: order_quote_sessions
            columns:
              - column:
                  name: owner_user_id
                  type: uuid
              - column:
                  name: booking_channel
                  type: varchar(20)
              - column:
                  name: guest_access_token
                  type: varchar(120)
        - addColumn:
            tableName: order_quotes
            columns:
              - column:
                  name: quote_id
                  type: varchar(120)
        - createIndex:
            indexName: idx_orders_owner_user_id
            tableName: orders
            columns:
              - column:
                  name: owner_user_id
        - createIndex:
            indexName: idx_order_quote_sessions_owner_user_id
            tableName: order_quote_sessions
            columns:
              - column:
                  name: owner_user_id
