databaseChangeLog:
  - changeSet:
      id: 015-create-user-addresses-table
      author: codex
      changes:
        - createTable:
            tableName: user_addresses
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: uuid
              - column:
                  name: owner_user_id
                  type: uuid
              - column:
                  name: owner_type
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: label
                  type: varchar(120)
              - column:
                  name: line_1
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: line_2
                  type: varchar(255)
              - column:
                  name: city
                  type: varchar(120)
                  constraints:
                    nullable: false
              - column:
                  name: state
                  type: varchar(120)
                  constraints:
                    nullable: false
              - column:
                  name: country
                  type: varchar(120)
                  constraints:
                    nullable: false
              - column:
                  name: pincode
                  type: varchar(40)
                  constraints:
                    nullable: false
              - column:
                  name: locality
                  type: varchar(120)
              - column:
                  name: latitude
                  type: decimal(10,6)
                  constraints:
                    nullable: false
              - column:
                  name: longitude
                  type: decimal(10,6)
                  constraints:
                    nullable: false
              - column:
                  name: is_default
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
              - column:
                  name: updated_at
                  type: timestamp
        - createIndex:
            indexName: idx_user_addresses_tenant_id
            tableName: user_addresses
            columns:
              - column:
                  name: tenant_id
        - createIndex:
            indexName: idx_user_addresses_owner_user_id
            tableName: user_addresses
            columns:
              - column:
                  name: owner_user_id
