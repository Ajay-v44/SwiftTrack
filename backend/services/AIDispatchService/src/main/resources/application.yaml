spring:
  application:
    name: AIDispatchService
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?currentSchema=driver,public
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-init-sql: SET search_path TO driver, public
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5:1.5b-instruct
          temperature: 0.1
          format: json
          keep-alive: 1h

server:
  port: ${SERVER_PORT:8010}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://127.0.0.1:8761/eureka/}
  instance:
    hostname: 127.0.0.1
    prefer-ip-address: true
    ip-address: 127.0.0.1
    instance-id: ${spring.application.name}:${server.port}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    use-root-path: true
    show-extensions: true
  show-actuator: false

# LangSmith Configuration
langsmith:
  api-key: ${LANGSMITH_API_KEY}
  base-url: https://api.smith.langchain.com

# Langfuse Configuration
langfuse:
  secret-key: ${LANGFUSE_SECRET_KEY}
  public-key: ${LANGFUSE_PUBLIC_KEY}
  base-url: ${LANGFUSE_BASE_URL:https://cloud.langfuse.com}

# Dispatch Pipeline Configuration
dispatch:
  max-drivers: 5
  max-memory-per-driver: 3
  inference-timeout-ms: 200
  pipeline-timeout-ms: 400
  ollama:
    model: qwen2.5:3b-instruct
    temperature: 0.1
