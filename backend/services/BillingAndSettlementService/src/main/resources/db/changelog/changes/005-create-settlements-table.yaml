databaseChangeLog:
  - changeSet:
      id: 005-create-settlements-table
      author: swifttrack
      changes:
        - createTable:
            schemaName: billing
            tableName: settlements
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: account_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: decimal(14,2)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: external_reference
                  type: varchar(255)
              - column:
                  name: initiated_by
                  type: uuid
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addForeignKeyConstraint:
            baseTableSchemaName: billing
            baseTableName: settlements
            baseColumnNames: account_id
            referencedTableSchemaName: billing
            referencedTableName: accounts
            referencedColumnNames: id
            constraintName: fk_settlements_account
        - createIndex:
            schemaName: billing
            tableName: settlements
            indexName: idx_settlements_account
            columns:
              - column:
                  name: account_id
        - createIndex:
            schemaName: billing
            tableName: settlements
            indexName: idx_settlements_status
            columns:
              - column:
                  name: status
