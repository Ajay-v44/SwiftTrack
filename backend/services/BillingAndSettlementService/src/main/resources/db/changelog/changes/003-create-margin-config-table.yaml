databaseChangeLog:
  - changeSet:
      id: 003-create-margin-config-table
      author: swifttrack
      changes:
        - createTable:
            schemaName: billing
            tableName: margin_config
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: organization_type
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: margin_type
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: key
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: value
                  type: decimal(14,4)
                  constraints:
                    nullable: false
              - column:
                  name: is_active
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: uuid
              - column:
                  name: updated_by
                  type: uuid
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
        - createIndex:
            schemaName: billing
            tableName: margin_config
            indexName: idx_mc_user_active
            columns:
              - column:
                  name: user_id
              - column:
                  name: is_active
