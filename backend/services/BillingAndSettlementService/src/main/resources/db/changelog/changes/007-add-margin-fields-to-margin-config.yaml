databaseChangeLog:
  - changeSet:
      id: 007-add-margin-fields-to-margin-config
      author: swifttrack
      changes:
        - addColumn:
            schemaName: billing
            tableName: margin_config
            columns:
              - column:
                  name: base_fare
                  type: decimal(14,2)
              - column:
                  name: per_km_rate
                  type: decimal(14,2)
              - column:
                  name: commission_percent
                  type: decimal(7,4)
              - column:
                  name: minimum_platform_fee
                  type: decimal(14,2)
