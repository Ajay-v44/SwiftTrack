databaseChangeLog:
  - changeSet:
      id: 004-create-pricing-snapshots-table
      author: swifttrack
      changes:
        - createTable:
            schemaName: billing
            tableName: pricing_snapshots
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_id
                  type: uuid
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: provider_cost
                  type: decimal(14,2)
              - column:
                  name: driver_cost
                  type: decimal(14,2)
              - column:
                  name: platform_margin
                  type: decimal(14,2)
                  constraints:
                    nullable: false
              - column:
                  name: tenant_charge
                  type: decimal(14,2)
                  constraints:
                    nullable: false
              - column:
                  name: pricing_source
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            schemaName: billing
            tableName: pricing_snapshots
            indexName: idx_ps_order_id
            unique: true
            columns:
              - column:
                  name: order_id
