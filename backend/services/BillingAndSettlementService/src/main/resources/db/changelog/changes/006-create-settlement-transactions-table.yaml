databaseChangeLog:
  - changeSet:
      id: 006-create-settlement-transactions-table
      author: swifttrack
      changes:
        - createTable:
            schemaName: billing
            tableName: settlement_transactions
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: settlement_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: ledger_transaction_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableSchemaName: billing
            baseTableName: settlement_transactions
            baseColumnNames: settlement_id
            referencedTableSchemaName: billing
            referencedTableName: settlements
            referencedColumnNames: id
            constraintName: fk_st_settlement
        - addForeignKeyConstraint:
            baseTableSchemaName: billing
            baseTableName: settlement_transactions
            baseColumnNames: ledger_transaction_id
            referencedTableSchemaName: billing
            referencedTableName: ledger_transactions
            referencedColumnNames: id
            constraintName: fk_st_ledger_transaction
        - createIndex:
            schemaName: billing
            tableName: settlement_transactions
            indexName: idx_st_settlement
            columns:
              - column:
                  name: settlement_id
        - createIndex:
            schemaName: billing
            tableName: settlement_transactions
            indexName: idx_st_ledger
            columns:
              - column:
                  name: ledger_transaction_id
