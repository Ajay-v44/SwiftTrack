# CI/CD Workflow for SwiftTrack Python SDK
# Uses GitHub OIDC for secure PyPI publishing
# Reference: https://docs.github.com/en/actions/deployment/security-hardening-your-deployments/configuring-openid-connect-in-pypi

name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # LINT & TYPE CHECK
  # ============================================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd backend/sdk
          pip install -e .[dev]

      - name: Run ruff linter
        run: |
          cd backend/sdk
          ruff check src tests

      - name: Run ruff format check
        run: |
          cd backend/sdk
          ruff format --check src tests

      - name: Run mypy type check
        run: |
          cd backend/sdk
          mypy src

  # ============================================================================
  # TEST
  # ============================================================================
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          cd backend/sdk
          pip install -e .[dev]

      - name: Run tests
        run: |
          cd backend/sdk
          pytest --cov=swifttrack --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: ./backend/sdk/coverage.xml
          fail_ci_if_error: false
          verbose: true

  # ============================================================================
  # BUILD PACKAGE
  # ============================================================================
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: pip install build twine

      - name: Auto-increment version
        if: github.ref == 'refs/heads/main'
        run: |
          cd backend/sdk
          # Bump patch version using a simple script
          python -c "
import re
with open('pyproject.toml', 'r') as f: content = f.read()
match = re.search(r'version = \"(\d+)\.(\d+)\.(\d+)\"', content)
if match:
    major, minor, patch = match.groups()
    new_version = f'version = \"{major}.{minor}.{int(patch) + 1}.dev${{github.run_number}}\"'
    content = re.sub(r'version = \"\d+\.\d+\.\d+\"', new_version, content)
    with open('pyproject.toml', 'w') as f: f.write(content)
"
          cat pyproject.toml | grep version

      - name: Build package
        run: |
          cd backend/sdk
          python -m build

      - name: Check package with twine
        run: |
          cd backend/sdk
          twine check dist/*

      - name: Test package installation
        run: |
          cd backend/sdk
          pip install dist/*.whl
          python -c "import swifttrack; print(f'Version: {swifttrack.__version__}')"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: backend/sdk/dist/
          retention-days: 5

  # ============================================================================
  # PUBLISH TO TESTPYPI
  # Triggered on tags or releases
  # ============================================================================
  publish-test:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    permissions:
      id-token: write  # Required for OIDC trusted publishing
      contents: read

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true

  # ============================================================================
  # PUBLISH TO PYPI (PRODUCTION)
  # Only triggered on GitHub releases
  # Requires manual approval via environment protection rules
  # ============================================================================
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, publish-test]
    if: github.ref == 'refs/heads/main'

    permissions:
      id-token: write  # Required for OIDC trusted publishing
      contents: read

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
